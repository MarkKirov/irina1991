name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /root/irina1991
            git pull origin main
            npm ci || npm install
            npm run build
            rm -rf /var/www/irinalogacheva/*
            cp -r dist/* /var/www/irinalogacheva/
            echo "Deploy OK"